name: Fix users role enum

on:
  workflow_dispatch:

jobs:
  fix-role:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Fix role enum and promote admin
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
        run: |
          psql "$DATABASE_URL_UNPOOLED" << 'EOF'

          ALTER TABLE users
          ALTER COLUMN role DROP DEFAULT;

          ALTER TABLE users
          ALTER COLUMN role TYPE role
          USING (
            CASE
              WHEN role::text = 'admin' THEN 'super_admin'
              WHEN role::text = 'user' THEN 'facility_admin'
              ELSE role::text
            END
          )::role;

          ALTER TABLE users
          ALTER COLUMN role SET DEFAULT 'facility_admin'::role;

          UPDATE users
          SET role = 'super_admin'
          WHERE email = 'theglitterz1@gmail.com';

          DROP TYPE IF EXISTS role_old;

          SELECT email, role FROM users;

          EOF
