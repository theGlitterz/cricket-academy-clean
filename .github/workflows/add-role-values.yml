name: Fix users role enum

on:
  workflow_dispatch:

jobs:
  fix-role:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Convert users.role to new enum
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
        run: |
          psql "$DATABASE_URL_UNPOOLED" << 'EOF'

          DO $$
          BEGIN
            IF NOT EXISTS (
              SELECT 1
              FROM pg_type
              WHERE typname = 'role'
            ) THEN
              CREATE TYPE role AS ENUM ('super_admin', 'facility_admin');
            END IF;
          END $$;

          ALTER TABLE users
          ALTER COLUMN role TYPE role
          USING (
            CASE
              WHEN role::text = 'admin' THEN 'super_admin'
              ELSE 'facility_admin'
            END
          )::role;

          DROP TYPE IF EXISTS role_old;

          EOF

      - name: Verify result
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
        run: |
          psql "$DATABASE_URL_UNPOOLED" -c "select email, role from users;"
